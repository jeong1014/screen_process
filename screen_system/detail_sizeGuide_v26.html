<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本スクリーンゴルフ生地専門店</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cdi: {
              main: '#0047AB',       // 기본 CDI 블루
              dark: '#002f73',       // 마우스 오버 시 어두워지는 블루
              light: '#f0f5ff',      // 선택된 배경 연한 블루
              border: '#cce0ff'      // 연한 블루 테두리
            }
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    
    // アイコンコンポーネント
    const ShoppingCart = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    );
    
    const Award = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
      </svg>
    );
    
    const Shield = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    );
    
    const Truck = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    );
    
    const Calculator = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/>
        <line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="14" x2="8" y2="14"/>
        <line x1="12" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/>
        <line x1="12" y1="18" x2="12" y2="18"/><line x1="16" y1="18" x2="16" y2="18"/>
      </svg>
    );
    
    const Maximize2 = ({ className, size = 24 }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    );

    function GolfScreenShop() {
      const [screenType, setScreenType] = useState(null);
      const [velcroType, setVelcroType] = useState('male');
      const [velcroSides, setVelcroSides] = useState('3');
      const [frontFabricType, setFrontFabricType] = useState('low-noise');
      const [backFabricType, setBackFabricType] = useState('low-noise');
      
      const [frontHeight, setFrontHeight] = useState(3000);
      const [frontWidth, setFrontWidth] = useState(2000);
      const [frontWidthInput, setFrontWidthInput] = useState('2000');
      const [frontHeightInput, setFrontHeightInput] = useState('3000');

      const [backHeight, setBackHeight] = useState(3000);
      const [backWidth, setBackWidth] = useState(2000);
      const [backWidthInput, setBackWidthInput] = useState('2000');
      const [backHeightInput, setBackHeightInput] = useState('3000');

      const [hasSkirt, setHasSkirt] = useState(false);
      const [skirtNoSeam, setSkirtNoSeam] = useState(false);
      const [skirtAttachment, setSkirtAttachment] = useState('sew'); // 'sew' | 'velcro'
      const [isFireRetardant, setIsFireRetardant] = useState(false);

      const [eyeletSides, setEyeletSides] = useState('3'); 
      const [eyeletSpacing, setEyeletSpacing] = useState(300); 
      // --- v23: 하토메 배치 방식 상태 추가 ---
      const [eyeletMethod, setEyeletMethod] = useState('A'); 

      const [quantity, setQuantity] = useState(1);
      const [quantityInput, setQuantityInput] = useState('1');
      const [showSampleModal, setShowSampleModal] = useState(false);
      const [showOrderModal, setShowOrderModal] = useState(false);
      const [showSizeGuideModal, setShowSizeGuideModal] = useState(false);
      const [showSkirtGuideModal, setShowSkirtGuideModal] = useState(false);
      const [showAdminModal, setShowAdminModal] = useState(false);
      const [showAdminPanel, setShowAdminPanel] = useState(false);
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [adminId, setAdminId] = useState('');
      const [adminPw, setAdminPw] = useState('');
      const [showCart, setShowCart] = useState(false);
      const [cart, setCart] = useState([]);
      const [selectedCartItems, setSelectedCartItems] = useState([]);
      // --- 注文をDBへ登録するための顧客情報 / 送信状態 ---
      const API_BASE = ""; // /shop で同一オリジン配信のため空。別サーバーなら "http://localhost:8000"
      const [custName, setCustName] = useState('');
      const [custPhone, setCustPhone] = useState('');
      const [custPostal, setCustPostal] = useState('');
      const [custAddress, setCustAddress] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [showEyeletGuideModal, setShowEyeletGuideModal] = useState(false); 
      const [showFabricGuideModal, setShowFabricGuideModal] = useState(false);
      const [showEyeletLayoutModal, setShowEyeletLayoutModal] = useState(false);

      const widthCategories = {
        small: { label: 'S (～3m)', min: 2000, max: 3000 },
        medium: { label: 'M (3m～4m)', min: 3010, max: 4000 },
        large: { label: 'L (4m～6m)', min: 4010, max: 6000 }
      };
      
      const [frontWidthCategory, setFrontWidthCategory] = useState('small');
      const [backWidthCategory, setBackWidthCategory] = useState('small');

      const handleFrontWidthCategoryChange = (key) => {
        setFrontWidthCategory(key);
        const cat = widthCategories[key];
        if (frontWidth < cat.min || frontWidth > cat.max) {
          setFrontWidth(cat.max);
          setFrontWidthInput(cat.max.toString());
        }
      };

      const handleBackWidthCategoryChange = (key) => {
        setBackWidthCategory(key);
        const cat = widthCategories[key];
        if (backWidth < cat.min || backWidth > cat.max) {
          setBackWidth(cat.max);
          setBackWidthInput(cat.max.toString());
        }
      };

      const [fabricImages, setFabricImages] = useState({
        'double-poly': './detail_photo/DP.jpg',
        'special-double-poly': './detail_photo/SDP.jpg',
        'low-noise': './detail_photo/LN.jpg'
      });
      const [fabricHoverImages, setFabricHoverImages] = useState({
        'double-poly': './detail_photo/DP.jpg',
        'special-double-poly': './detail_photo/SDP.jpg',
        'low-noise': './detail_photo/LN.jpg'
      });
      const [screenTypeImages, setScreenTypeImages] = useState({ single: '', double: './detail_photo/2maiscreen.jpg' });
      const [eyeletImages, setEyeletImages] = useState({ A: '', B: '', C: '' });
      const [hoverPreview, setHoverPreview] = useState(null); // {src, title}

      const [skirtSettings, setSkirtSettings] = useState({
        baseWidthMm: 3720,
        basePriceYen: 7000,
        noSeamAdd: 3000,
        noSeamMinWidth: 3300,
      });

      const [fabricPriceSettings, setFabricPriceSettings] = useState({
        basePricePerMm: 117,
        dpMultiplier: 1.1,
        sdpMultiplier: 1.2,
      });

      const [fireDiscountRate, setFireDiscountRate] = useState(20);
      const [eyelet4SideFlatFee, setEyelet4SideFlatFee] = useState(1100);
      const [velcroSidePrice, setVelcroSidePrice] = useState(1.5); // 75,000원÷10=7,500円/50m → 1.5円/10mm

      const [discountTiers, setDiscountTiers] = useState([
        { id: 1, minQty: 6,  maxQty: 10,   rate: 5  },
        { id: 2, minQty: 11, maxQty: 20,   rate: 10 },
        { id: 3, minQty: 21, maxQty: 50,   rate: 15 },
        { id: 4, minQty: 51, maxQty: null, rate: 20 },
      ]);

      const screenTypes = {
        single: { label: '1枚スクリーン', tag: 'シンプル・低コスト', description: '1枚構造。\n新規設置・表地の交換にも対応。', note: null },
        double: { label: '2枚スクリーンSET', tag: 'スタンダード・おすすめ', description: '表裏2枚構成のスタンダードモデル。', note: null },
      };

      const fabricTypes = {
        'low-noise': { name: 'LN', tag: '静音優先', description: '打撃音を大幅に軽減。\n静音性重視。' },
        'double-poly': { name: 'DP', tag: 'はじめての方に最適', description: '耐久性・画質・価格のバランスモデル。' },
        'special-double-poly': { name: 'SDP', tag: '高画質優先', description: '密度が高く映像がクリア。\n高画質重視。' },
      };

      const calculateFabricPrice = (fabricType, wMm, fireOpt) => {
        if (isNaN(wMm)) return 0;
        let price = (wMm / 10) * fabricPriceSettings.basePricePerMm;
        if (fabricType === 'double-poly') price *= fabricPriceSettings.dpMultiplier;
        else if (fabricType === 'special-double-poly') price *= fabricPriceSettings.sdpMultiplier;
        if (fireOpt === false) price *= (1 - fireDiscountRate / 100);
        return Math.round(price / 100) * 100;
      }
      
      const calculateSkirtPrice = (wMm, fireOpt) => {
        if (isNaN(wMm)) return 0;
        let price = (wMm / skirtSettings.baseWidthMm) * skirtSettings.basePriceYen;
        if (fireOpt === false) price *= (1 - fireDiscountRate / 100);
        return Math.round(price / 100) * 100;
      };

      const calculateDiscount = (qty) => {
        const sorted = [...discountTiers].sort((a, b) => b.minQty - a.minQty);
        for (const tier of sorted) {
          if (qty >= tier.minQty) return tier.rate / 100;
        }
        return 0;
      };

      const handleAdminLogin = () => {
        if (adminId === 'admin' && adminPw === '1234') {
          setIsAdminMode(true);
          setShowAdminModal(false);
          alert('管理者モードに入りました');
        } else {
          alert('IDまたはパスワードが間違っています');
        }
      };

      const handleImageUpload = (fabricType, event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setFabricImages(prev => ({ ...prev, [fabricType]: reader.result })); };
          reader.readAsDataURL(file);
        }
      };
      const handleFabricHoverImageUpload = (fabricType, event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setFabricHoverImages(prev => ({ ...prev, [fabricType]: reader.result })); };
          reader.readAsDataURL(file);
        }
      };
      const handleScreenTypeImageUpload = (key, event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setScreenTypeImages(prev => ({ ...prev, [key]: reader.result })); };
          reader.readAsDataURL(file);
        }
      };
      const handleEyeletImageUpload = (key, event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => { setEyeletImages(prev => ({ ...prev, [key]: reader.result })); };
          reader.readAsDataURL(file);
        }
      };

      const eyeletLayout = useMemo(() => {
        if (screenType === 'skirtOnly') return null;

        const widthMm = frontWidth;
        const heightMm = frontHeight;

        // v23: 현재는 A, B, C 방식 모두 아래의 동일한 로직을 사용합니다.
        // 추후 로직이 확정되면 if (eyeletMethod === 'A') { ... } else if ('B') { ... } 형태로 분기 가능
        const calcPositions = (lengthMm, pitchMm) => {
          if (lengthMm <= pitchMm) {
            return [0, lengthMm];
          }
          let count = Math.round(lengthMm / pitchMm);
          if (count < 2) count = 2;
          const step = lengthMm / count;
          const result = [];
          for (let i = 0; i <= count; i++) {
            result.push(i * step);
          }
          return result;
        };

        const useTop = true;
        const useLeft = true;
        const useRight = true;
        const useBottom = eyeletSides === '4';

        const top = useTop ? calcPositions(widthMm, eyeletSpacing) : [];
        const bottom = useBottom ? calcPositions(widthMm, eyeletSpacing) : [];
        const left = useLeft ? calcPositions(heightMm, eyeletSpacing) : [];
        const right = useRight ? calcPositions(heightMm, eyeletSpacing) : [];

        let overlap = 0;
        if (useTop && useLeft && top.length && left.length) overlap++;
        if (useTop && useRight && top.length && right.length) overlap++;
        if (useBottom && useLeft && bottom.length && left.length) overlap++;
        if (useBottom && useRight && bottom.length && right.length) overlap++;

        const total = top.length + bottom.length + left.length + right.length - overlap;
        // 3면 기준 개수 (하단 제외) — 4면 고정요금 계산용
        const overlap3 = (top.length && left.length ? 1 : 0) + (top.length && right.length ? 1 : 0);
        const total3Side = top.length + left.length + right.length - overlap3;

        return { widthMm, heightMm, top, bottom, left, right, total, total3Side, useTop, useBottom, useLeft, useRight };
      }, [
        frontWidth, frontHeight, eyeletSpacing, screenType, eyeletSides, eyeletMethod
      ]);

      const totalPrice = useMemo(() => {
        if (!screenType) return { subtotal: 0, eyeletCost: 0, velcroCost: 0, skirtCost: 0, fireDiscount: 0, discount: 0, discountAmount: 0, total: 0, freeShipping: false };
        let subtotal = 0;

        const currentSkirtPrice = calculateSkirtPrice(frontWidth, isFireRetardant);
    
        if (screenType === 'skirtOnly') {
          subtotal = currentSkirtPrice; 
          if (frontWidth > skirtSettings.noSeamMinWidth && skirtNoSeam) subtotal += skirtSettings.noSeamAdd;
        } else if (screenType === 'single' || screenType === 'replacement') {
          subtotal = calculateFabricPrice(frontFabricType, frontWidth, isFireRetardant);
          if (hasSkirt) {
            subtotal += currentSkirtPrice; 
            if (frontWidth > skirtSettings.noSeamMinWidth && skirtNoSeam) subtotal += skirtSettings.noSeamAdd;
          }
        } else if (screenType === 'double') {
          subtotal = calculateFabricPrice(frontFabricType, frontWidth, isFireRetardant);
          subtotal += calculateFabricPrice(backFabricType, backWidth, isFireRetardant);
          if (hasSkirt) {
            subtotal += currentSkirtPrice; 
            if (frontWidth > skirtSettings.noSeamMinWidth && skirtNoSeam) subtotal += skirtSettings.noSeamAdd;
          }
        }
        const discount = calculateDiscount(quantity);
        const maxTierMin = discountTiers.length > 0 ? Math.max(...discountTiers.map(t => t.minQty)) : 51;
        const eyeletCost = (screenType !== 'skirtOnly' && eyeletLayout && eyeletSides === '4')
          ? eyelet4SideFlatFee : 0;
        
        const velcroBase = (frontWidth / 10) * velcroSidePrice;
        const velcroMultiplier = velcroSides === 'none' ? 0 : parseInt(velcroSides) || 0;
        const velcroCost = (screenType !== 'skirtOnly' && velcroSides !== 'none')
          ? Math.ceil(velcroBase * velcroMultiplier / 100) * 100
          : 0;
        
        const skirtCost = hasSkirt || screenType === 'skirtOnly'
          ? currentSkirtPrice + (frontWidth > skirtSettings.noSeamMinWidth && skirtNoSeam ? skirtSettings.noSeamAdd : 0)
          : 0;
        const fireDiscount = !isFireRetardant ? Math.round(subtotal * (fireDiscountRate / 100)) : 0;
        const total = (subtotal + eyeletCost + velcroCost) * (1 - discount) * quantity;
        return {
          subtotal,
          eyeletCost,
          velcroCost,
          skirtCost,
          fireDiscount,
          discount: discount * 100,
          discountAmount: (subtotal + eyeletCost + velcroCost) * discount * quantity,
          total,
          freeShipping: quantity >= maxTierMin
        };
      }, [screenType, frontFabricType, backFabricType, frontWidth, frontHeight, backWidth, backHeight, hasSkirt, skirtNoSeam, quantity, isFireRetardant, eyeletLayout, velcroSides, eyeletSides, fabricPriceSettings, fireDiscountRate, eyelet4SideFlatFee, velcroSidePrice, skirtSettings, discountTiers]);

      // 現在の選択状態を、バックエンド(POST /api/orders の ItemIn)が期待する形へ変換する。
      // - product_type: single / two_sheet_set(=2枚SET) / skirt(=スカートのみ)
      // - ハトメは辺(top/bottom/left/right)ごとの process="eyelet" + 間隔mm で表現。
      //     3辺=上/左/右、4辺=それに下を追加(価格計算の useBottom と同じ規則)。
      // - スカートは下辺(process_bottom="skirt")として表現(ハトメ下辺より優先)。
      // - ベルクロは辺ごとには載せず、item単位の velcro_type(オス/メス)で保持。
      const buildItemSpec = () => {
        const fabName = ft => (fabricTypes[ft] ? fabricTypes[ft].name : 'LN');
        const pt = screenType === 'double' ? 'two_sheet_set'
                 : (screenType === 'skirtOnly' ? 'skirt' : 'single');
        const proc = { top: 'none', bottom: 'none', left: 'none', right: 'none' };
        const pmm  = { top: null, bottom: null, left: null, right: null };
        if (screenType !== 'skirtOnly') {
          const es = eyeletSides === '4' ? ['top', 'bottom', 'left', 'right'] : ['top', 'left', 'right'];
          es.forEach(s => { proc[s] = 'eyelet'; pmm[s] = eyeletSpacing; });
        }
        if (hasSkirt) { proc.bottom = 'skirt'; pmm.bottom = null; }
        return {
          product_type: pt,
          fabric_type: fabName(frontFabricType),
          width_mm: Math.max(1, parseInt(frontWidth) || 1),
          height_mm: Math.max(1, parseInt(frontHeight) || 1),
          quantity: Math.max(1, parseInt(quantity) || 1),
          back_fabric_type: screenType === 'double' ? fabName(backFabricType) : null,
          back_width_mm: screenType === 'double' ? (parseInt(backWidth) || null) : null,
          back_height_mm: screenType === 'double' ? (parseInt(backHeight) || null) : null,
          process_top: proc.top, process_top_mm: pmm.top,
          process_bottom: proc.bottom, process_bottom_mm: pmm.bottom,
          process_left: proc.left, process_left_mm: pmm.left,
          process_right: proc.right, process_right_mm: pmm.right,
          velcro_type: velcroType,                       // 'male' | 'female'
          skirt_attachment: hasSkirt ? skirtAttachment : null,
          skirt_no_seam: hasSkirt ? !!skirtNoSeam : false,
          eyelet_method: screenType !== 'skirtOnly' ? eyeletMethod : null,
          fire_cert_no: isFireRetardant ? '防炎' : null,
        };
      };

      // カートの全品目を1件の注文としてDBへ登録する。
      const submitOrderToDB = async () => {
        if (cart.length === 0) { alert('カートが空です。'); return; }
        if (!custName.trim())   { alert('お名前を入力してください。'); return; }
        if (!custPhone.trim())  { alert('電話番号を入力してください。'); return; }
        if (!custPostal.trim()) { alert('郵便番号を入力してください。'); return; }
        if (!custAddress.trim()){ alert('お届け先住所を入力してください。'); return; }
        setSubmitting(true);
        try {
          const body = {
            channel: 'self',
            customer_name: custName.trim(),
            phone: custPhone.trim(),
            postal_code: custPostal.trim(),
            address: custAddress.trim(),
            payment_status: 'pending',
            items: cart.map(i => i.spec).filter(Boolean),
          };
          const r = await fetch(API_BASE + '/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (!r.ok) {
            alert('注文の登録に失敗しました:\n' + JSON.stringify(d.detail || d, null, 2));
            setSubmitting(false);
            return;
          }
          alert('ご注文を受け付けました。\n注文番号: ' + d.order_no +
                '\n製品番号: ' + (d.barcodes || []).join(', '));
          setCart([]); setSelectedCartItems([]);
          setCustName(''); setCustPhone(''); setCustPostal(''); setCustAddress('');
          setShowOrderModal(false); setShowCart(false);
        } catch (e) {
          alert('サーバー接続に失敗しました: ' + e);
        }
        setSubmitting(false);
      };

      const addToCart = () => {
        if (!screenType) { alert('スクリーンタイプを選択してください。'); return; }
        const item = {
          id: Date.now(),
          screenType: screenTypes[screenType] ? screenTypes[screenType].label : screenType,
          fireRetardant: isFireRetardant ? 'あり' : 'なし',
          fireDiscount: totalPrice.fireDiscount,
          velcroType: (screenType === 'skirtOnly' || velcroSides === 'none') 
            ? null 
            : (velcroType === 'male' ? 'オス' : 'メス') + 'ベルクロ',
          velcroSides: velcroSides === 'none' ? 'なし' : velcroSides,
          velcroCost: totalPrice.velcroCost,
          frontFabric: screenType !== 'skirtOnly' ? fabricTypes[frontFabricType].name : null,
          backFabric: screenType === 'double' ? fabricTypes[backFabricType].name : null,
          frontWidth: screenType !== 'skirtOnly' ? frontWidth : null,
          frontHeight: screenType !== 'skirtOnly' ? frontHeight : null,
          backWidth: screenType === 'double' ? backWidth : null,
          backHeight: screenType === 'double' ? backHeight : null,
          hasSkirt,
          skirtAttachment: hasSkirt ? skirtAttachment : null,
          skirtNoSeam: hasSkirt && frontWidth > skirtSettings.noSeamMinWidth ? skirtNoSeam : false,
          skirtCost: totalPrice.skirtCost,
          eyeletSides: screenType !== 'skirtOnly' ? eyeletSides : null,
          eyeletSpacing: screenType !== 'skirtOnly' ? eyeletSpacing : null,
          eyeletMethod: screenType !== 'skirtOnly' ? eyeletMethod : null, // v23: 하토메 방식 추가
          eyeletCount: (screenType !== 'skirtOnly' && eyeletLayout) ? eyeletLayout.total : 0,
          eyeletCost: totalPrice.eyeletCost,
          quantity,

                </div>
              </div>
            </div>
          )}

          {/* Admin Panel Modal */}
          {showAdminPanel && isAdminMode && (
            <div className="fixed inset-0 bg-gray-900 bg-opacity-40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-xl">
                <div className="sticky top-0 bg-white border-b border-gray-100 p-6 z-10">
                  <div className="flex items-center justify-between">
                    <h3 className="text-xl font-bold text-gray-900">管理者パネル</h3>
                    <button onClick={() => setShowAdminPanel(false)} className="text-gray-400 hover:text-gray-900 text-2xl transition-colors">✕</button>
                  </div>
                </div>

                <div className="p-8 space-y-8 bg-gray-50">
                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-1 text-gray-800 tracking-wider">生地素材 — 画像設定</h4>
                    <p className="text-xs text-gray-400 mb-4">カード内表示用とマウスオーバー時の画像を別々に設定できます</p>
                    <div className="space-y-4">
                      {Object.entries(fabricTypes).map(([key, fabric]) => (
                        <div key={key} className="p-4 border border-gray-100 rounded-lg bg-gray-50">
                          <h5 className="font-bold text-sm mb-3 text-gray-900">{fabric.name} <span className="text-xs text-gray-400 font-normal">{fabric.tag}</span></h5>
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <p className="text-[11px] font-bold text-gray-500 mb-1.5">📷 カード内表示用</p>
                              <input type="file" accept="image/*" onChange={(e) => handleImageUpload(key, e)} className="text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300 w-full" />
                              {fabricImages[key] && <div className="mt-2 w-full h-14 border border-gray-200 rounded bg-white overflow-hidden"><img src={fabricImages[key]} alt={fabric.name} className="w-full h-full object-cover" /></div>}
                            </div>
                            <div>
                              <p className="text-[11px] font-bold text-gray-500 mb-1.5">🔍 ホバー時プレビュー用</p>
                              <input type="file" accept="image/*" onChange={(e) => handleFabricHoverImageUpload(key, e)} className="text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 w-full" />
                              {fabricHoverImages[key] && <div className="mt-2 w-full h-14 border border-blue-200 rounded bg-white overflow-hidden"><img src={fabricHoverImages[key]} alt={fabric.name} className="w-full h-full object-cover" /></div>}
                              {!fabricHoverImages[key] && <p className="text-[10px] text-gray-300 mt-1">未設定の場合、カード用画像を使用</p>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-1 text-gray-800 tracking-wider">スクリーン構成 — ホバー画像</h4>
                    <p className="text-xs text-gray-400 mb-4">1枚・2枚それぞれのイメージ写真を登録</p>
                    <div className="space-y-3">
                      {[{key:'single', label:'1枚スクリーン'}, {key:'double', label:'2枚スクリーンSET'}].map(({key, label}) => (
                        <div key={key} className="flex items-center gap-4 p-3 border border-gray-100 rounded bg-gray-50">
                          <div className="flex-1"><h5 className="font-bold text-sm mb-1 text-gray-900">{label}</h5><input type="file" accept="image/*" onChange={(e) => handleScreenTypeImageUpload(key, e)} className="text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300" /></div>
                          {screenTypeImages[key] && <div className="w-16 h-16 border border-gray-200 rounded bg-white overflow-hidden flex-shrink-0"><img src={screenTypeImages[key]} alt={label} className="w-full h-full object-cover" /></div>}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-1 text-gray-800 tracking-wider">ハトメ方式 — ホバー画像</h4>
                    <p className="text-xs text-gray-400 mb-4">方式A・B・Cの配置説明図などを登録</p>
                    <div className="space-y-3">
                      {[{key:'A', label:'方式A — コーナー基準'}, {key:'B', label:'方式B — 間隔均等'}, {key:'C', label:'方式C — 未定'}].map(({key, label}) => (
                        <div key={key} className="flex items-center gap-4 p-3 border border-gray-100 rounded bg-gray-50">
                          <div className="flex-1"><h5 className="font-bold text-sm mb-1 text-gray-900">{label}</h5><input type="file" accept="image/*" onChange={(e) => handleEyeletImageUpload(key, e)} className="text-xs text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-200 file:text-gray-700 hover:file:bg-gray-300" /></div>
                          {eyeletImages[key] && <div className="w-16 h-16 border border-gray-200 rounded bg-white overflow-hidden flex-shrink-0"><img src={eyeletImages[key]} alt={label} className="w-full h-full object-cover" /></div>}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-4 text-gray-800 tracking-wider">価格計算パラメータ</h4>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">LN 基準単価</label><input type="number" step="0.1" value={fabricPriceSettings.basePricePerMm} onChange={(e) => setFabricPriceSettings({...fabricPriceSettings, basePricePerMm: parseFloat(e.target.value)||0})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">DP 割増率</label><input type="number" step="0.01" value={fabricPriceSettings.dpMultiplier} onChange={(e) => setFabricPriceSettings({...fabricPriceSettings, dpMultiplier: parseFloat(e.target.value)||1})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">SDP 割増率</label><input type="number" step="0.01" value={fabricPriceSettings.sdpMultiplier} onChange={(e) => setFabricPriceSettings({...fabricPriceSettings, sdpMultiplier: parseFloat(e.target.value)||1})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                    </div>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-4 text-gray-800 tracking-wider">オプション単価</h4>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">防炎なし 割引率 (%)</label><input type="number" value={fireDiscountRate} onChange={(e) => setFireDiscountRate(parseInt(e.target.value)||0)} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-1 text-gray-500">ベルクロ4面下辺 追加 (¥/10mm)</label><p className="text-[10px] text-gray-400 mb-1.5">50m=₩75,000 → 1.5¥/10mm が基準</p><input type="number" value={velcroSidePrice} onChange={(e) => setVelcroSidePrice(parseInt(e.target.value)||0)} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">4面 固定追加料金 (¥)</label><input type="number" value={eyelet4SideFlatFee} onChange={(e) => setEyelet4SideFlatFee(parseInt(e.target.value)||0)} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                    </div>
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h4 className="text-sm font-bold mb-4 text-gray-800 tracking-wider">スカート設定</h4>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">基準幅(mm)</label><input type="number" value={skirtSettings.baseWidthMm} onChange={(e) => setSkirtSettings({...skirtSettings, baseWidthMm: parseInt(e.target.value)||1})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">基準価格(¥)</label><input type="number" value={skirtSettings.basePriceYen} onChange={(e) => setSkirtSettings({...skirtSettings, basePriceYen: parseInt(e.target.value)||0})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">無縫製 追加(¥)</label><input type="number" value={skirtSettings.noSeamAdd} onChange={(e) => setSkirtSettings({...skirtSettings, noSeamAdd: parseInt(e.target.value)||0})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                      <div><label className="block text-xs font-semibold mb-2 text-gray-500">無縫製 最小幅</label><input type="number" value={skirtSettings.noSeamMinWidth} onChange={(e) => setSkirtSettings({...skirtSettings, noSeamMinWidth: parseInt(e.target.value)||0})} className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded focus:bg-white focus:border-cdi-main outline-none text-sm" /></div>
                    </div>
                  </div>
                  
                  <div className="bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <div className="flex items-center justify-between mb-6">
                      <h4 className="text-sm font-bold text-gray-800 tracking-wider">数量割引ルール</h4>
                      <button onClick={() => { const maxMin = discountTiers.length > 0 ? Math.max(...discountTiers.map(t=>t.minQty)) : 0; setDiscountTiers([...discountTiers, { id: Date.now(), minQty: maxMin + 10, maxQty: null, rate: 0 }]); }} className="px-3 py-1.5 bg-cdi-main text-white rounded text-xs font-bold hover:bg-cdi-dark">追加</button>
                    </div>
                    <div className="space-y-3">
                      {[...discountTiers].sort((a,b) => a.minQty - b.minQty).map((tier) => (
                        <div key={tier.id} className="flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded">
                          <div className="flex-1 grid grid-cols-3 gap-4">
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Min Qty</label><input type="number" value={tier.minQty} onChange={(e) => setDiscountTiers(discountTiers.map(t => t.id===tier.id ? {...t, minQty: parseInt(e.target.value)||0} : t))} className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-sm outline-none focus:border-cdi-main" /></div>
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Max Qty</label><input type="number" value={tier.maxQty ?? ''} placeholder="∞" onChange={(e) => setDiscountTiers(discountTiers.map(t => t.id===tier.id ? {...t, maxQty: e.target.value===''?null:parseInt(e.target.value)||0} : t))} className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-sm outline-none focus:border-cdi-main" /></div>
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Discount (%)</label><input type="number" value={tier.rate} onChange={(e) => setDiscountTiers(discountTiers.map(t => t.id===tier.id ? {...t, rate: parseInt(e.target.value)||0} : t))} className="w-full px-2 py-1.5 bg-white border border-gray-200 rounded text-sm outline-none focus:border-cdi-main" /></div>
                          </div>
                          <button onClick={() => { if (discountTiers.length > 1) setDiscountTiers(discountTiers.filter(t => t.id !== tier.id)); }} className="p-2 text-gray-400 hover:text-red-500 mt-4">✕</button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="sticky bottom-0 bg-white border-t border-gray-100 p-6 flex justify-between">
                  <button onClick={() => { setIsAdminMode(false); setShowAdminPanel(false); alert('管理者モードを終了しました'); }} className="px-6 py-2.5 text-red-600 font-bold hover:bg-red-50 rounded transition-colors">ログアウト</button>
                  <button onClick={() => setShowAdminPanel(false)} className="px-8 py-2.5 bg-cdi-main text-white rounded font-bold hover:bg-cdi-dark transition-colors shadow-sm">保存</button>
                </div>
              </div>
            </div>
          )}

          {/* Order Modal */}
          {showOrderModal && (
            <div className="fixed inset-0 bg-gray-900 bg-opacity-40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-lg max-w-sm w-full p-8 shadow-xl">
                <h3 className="text-xl font-bold mb-1 text-gray-900">注文手続き</h3>
                <p className="text-sm text-gray-500 mb-6">お届け先を入力して注文を確定してください。</p>
                <div className="space-y-3 mb-6">
                  <input value={custName} onChange={e => setCustName(e.target.value)} type="text" placeholder="お名前" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-cdi-main outline-none transition-colors" />
                  <input value={custPhone} onChange={e => setCustPhone(e.target.value)} type="tel" placeholder="電話番号" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-cdi-main outline-none transition-colors" />
                  <input value={custPostal} onChange={e => setCustPostal(e.target.value)} type="text" placeholder="郵便番号 (例: 4910000)" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-cdi-main outline-none transition-colors" />
                  <textarea value={custAddress} onChange={e => setCustAddress(e.target.value)} placeholder="お届け先住所" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg h-20 focus:bg-white focus:border-cdi-main outline-none transition-colors resize-none" />
                </div>
                <div className="flex flex-col gap-3">
                  <button disabled={submitting} onClick={submitOrderToDB} className="w-full bg-cdi-main text-white py-3 rounded-lg font-bold hover:bg-cdi-dark transition-colors shadow-sm disabled:opacity-60">{submitting ? '送信中...' : '注文を確定する'}</button>
                  <button onClick={() => setShowOrderModal(false)} className="w-full bg-white text-gray-500 py-3 rounded-lg font-medium hover:text-gray-800 transition-colors border border-gray-200">キャンセル</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<GolfScreenShop />, document.getElementById('root'));
  </script>
</body>
</html>

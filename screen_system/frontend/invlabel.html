<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫QRラベル 29×90</title>
<style>
  /* ===== 用紙: 90mm(幅) × 29mm(高さ) ===== */
  @page { size: 90mm 29mm; margin: 0; }
  html, body { margin: 0; padding: 0; background: #fff; }
  * { box-sizing: border-box; }

  .label {
    width: 90mm; height: 29mm;
    display: flex; align-items: center; gap: 2.5mm;
    padding: 2mm 2.5mm;
    background: #fff; color: #000;
    font-family: Arial, Helvetica, "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    overflow: hidden;
    page-break-after: always;
  }
  .label:last-child { page-break-after: auto; }

  .qr { width: 25mm; height: 25mm; flex: 0 0 25mm; }
  .qr svg { width: 25mm; height: 25mm; display: block; }

  .info { flex: 1 1 auto; min-width: 0; }
  .info .sub    { font-size: 2.5mm; font-weight: 600; color: #333; letter-spacing: .2mm;
                  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info .title  { font-size: 4.6mm; font-weight: 800; line-height: 1.08; margin: .5mm 0;
                  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .info .serial { font-size: 5.4mm; font-weight: 900; letter-spacing: .4mm;
                  font-family: "Consolas","Courier New",monospace; }

  @media screen {
    body { background: #eef1f5; padding: 18px 0; }
    #sheet { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .label { border: 1px dashed #b9c3cf; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .err { color: #c0392b; font: 14px sans-serif; text-align:center; }
  }
</style>
</head>
<body>
  <div id="sheet"><div class="err" id="msg" style="display:none"></div></div>

  <!-- 既存 label.html と同じ QR Code Generator (Kazuhiko Arase, MIT) を共有 -->
  <script src="/static/qrcode.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const AUTO_PRINT = params.get("print") === "1";

    // 対象シリアル: ?serials=a,b,c があればそれ、無ければパス末尾を単票扱い
    let serials = (params.get("serials") || "").split(",").map(s => s.trim()).filter(Boolean);
    if (!serials.length) {
      const parts = location.pathname.split("/").filter(Boolean);
      const last = decodeURIComponent(parts[parts.length - 1] || "");
      if (last && last !== "invlabel") serials = [last];
    }

    function qrSvg(value) {
      const qr = qrcode(0, "M");
      qr.addData(value);
      qr.make();
      return qr.createSvgTag({ cellSize: 2, margin: 0, scalable: true });
    }

    function labelNode(d) {
      const el = document.createElement("div");
      el.className = "label";
      el.innerHTML =
        '<div class="qr">' + qrSvg(d.qrValue || d.serial) + '</div>' +
        '<div class="info">' +
          '<div class="sub">' + (d.sub || "") + '</div>' +
          '<div class="title">' + (d.title || "") + '</div>' +
          '<div class="serial">' + (d.serial || "") + '</div>' +
        '</div>';
      return el;
    }

    async function load() {
      const sheet = document.getElementById("sheet");
      if (!serials.length) {
        document.getElementById("msg").style.display = "block";
        document.getElementById("msg").textContent = "対象のシリアル/コードが指定されていません。";
        return;
      }
      let ok = 0;
      for (const s of serials) {
        try {
          const res = await fetch("/api/inventory/label/" + encodeURIComponent(s));
          if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
          const d = await res.json();
          sheet.appendChild(labelNode(d));
          ok++;
        } catch (e) {
          const err = document.createElement("div");
          err.className = "err";
          err.textContent = "取得失敗 (" + s + "): " + (e.message || e);
          sheet.appendChild(err);
        }
      }
      document.title = (ok === 1 ? serials[0] : ok + "枚") + " — 在庫QRラベル";
      if (AUTO_PRINT && ok) setTimeout(() => window.print(), 400);
    }
    load();
  </script>
</body>
</html>

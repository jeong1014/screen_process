<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送り状</title>
<style>
  *{box-sizing:border-box}
  body{font-family:"Yu Gothic UI","Noto Sans JP",sans-serif;margin:0;padding:18px;color:#111;background:#f4f6f9}
  .slip{border:2px solid #111;border-radius:6px;max-width:460px;margin:0 auto;background:#fff}
  .hd{background:#111;color:#fff;padding:9px 13px;font-weight:800;font-size:15px;display:flex;justify-content:space-between}
  .sec{padding:11px 15px;border-bottom:1px dashed #999}
  .lbl{font-size:11px;color:#666;margin-bottom:2px}
  .val{font-size:15px;font-weight:700} .big{font-size:21px;letter-spacing:1px}
  .row{display:flex;gap:14px} .row>div{flex:1}
  .foot{padding:8px 15px;font-size:11px;color:#666;display:flex;justify-content:space-between}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
  th,td{border:1px solid #bbb;padding:3px 6px;text-align:left} th{background:#eee}
  .bar{text-align:center;margin-top:14px}
  .bar button{padding:9px 20px;font-weight:700;cursor:pointer;border:1px solid #888;border-radius:8px;background:#fff}
  .err{max-width:460px;margin:40px auto;text-align:center;color:#c00;font-weight:700}
  @media print{ .noprint{display:none} body{background:#fff;padding:0} }
</style>
</head>
<body>
<div id="root" class="val" style="text-align:center;color:#666;margin-top:40px">読み込み中...</div>
<div class="bar noprint"><button onclick="window.print()">🖨 印刷</button></div>
<script>
const esc = s => (s==null?"":String(s)).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
const barcode = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop());
async function boot(){
  try{
    const r = await fetch("/api/shipping-slip/"+encodeURIComponent(barcode));
    if(!r.ok){ const e=await r.json().catch(()=>({detail:r.status})); throw new Error(e.detail||r.status); }
    const o = await r.json();
    const items = o.items||[];
    document.getElementById("root").outerHTML = `
      <div class="slip">
        <div class="hd"><span>送り状 (SHIPPING SLIP)</span><span>${esc(o.order_no)}</span></div>
        <div class="sec">
          <div class="lbl">お届け先 / TO</div>
          <div class="val big">〒 ${esc(o.postal_code||"—")}</div>
          <div class="val">${esc(o.address||"住所未登録")}</div>
          <div class="val" style="margin-top:6px">${esc(o.customer_name||"")} 様</div>
          <div class="val">TEL: ${esc(o.phone||"—")}</div>
        </div>
        <div class="sec row">
          <div><div class="lbl">ご依頼主 / FROM</div><div class="val">株式会社シーディアイ</div>
            <div style="font-size:12px">〒491-0922 愛知県一宮市</div></div>
          <div><div class="lbl">個口数</div><div class="val big">${items.length||1}</div>
            <div class="lbl" style="margin-top:6px">発行日</div><div class="val">${new Date().toLocaleDateString()}</div></div>
        </div>
        <div class="sec">
          <div class="lbl">内容品 / ITEMS</div>
          <table><tr><th>製品番号</th><th>生地</th><th>サイズ</th></tr>
            ${items.length?items.map(it=>`<tr><td>${esc(it.barcode)}</td><td>${esc(it.fabric)}</td><td>${esc(it.size)}</td></tr>`).join(""):`<tr><td colspan="3">明細なし</td></tr>`}
          </table>
        </div>
        <div class="foot"><span>チャネル: ${esc(o.channel||"")}</span><span>決済: ${esc(o.payment_status||"")}</span></div>
      </div>`;
    document.title = "送り状 "+o.order_no;
    setTimeout(()=>window.print(), 400);   // ハトメ完了時に自動で印刷ダイアログを出す
  }catch(e){
    document.getElementById("root").outerHTML = `<div class="err">送り状を表示できません: ${esc(e.message)}<br>(${esc(barcode)})</div>`;
  }
}
boot();
</script>
</body>
</html>

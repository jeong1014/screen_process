<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>注文入力</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --line:#334155; --text:#e2e8f0;
    --accent:#38bdf8; --ok:#22c55e; --muted:#94a3b8; --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:20px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .nav a{color:var(--accent);margin-right:14px;text-decoration:none;font-size:14px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
  input,select{width:100%;padding:7px 8px;background:#0b1220;border:1px solid var(--line);border-radius:6px;color:var(--text);font-size:14px}
  .grid{display:grid;gap:10px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  .g4{grid-template-columns:repeat(4,1fr)}
  .item{border:1px dashed var(--line);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
  .item h3{margin:0 0 6px;font-size:14px;color:var(--accent)}
  button{cursor:pointer;border:none;border-radius:7px;padding:9px 14px;font-size:14px;font-weight:600}
  .btn-add{background:#0b1220;color:var(--accent);border:1px solid var(--accent)}
  .btn-sub{background:var(--accent);color:#00263a;width:100%;padding:13px;font-size:16px}
  .btn-del{background:transparent;color:var(--danger);position:absolute;top:8px;right:8px;padding:2px 8px}
  #result{white-space:pre-wrap;font-family:monospace;font-size:13px;color:var(--ok)}
  .procrow{display:grid;grid-template-columns:70px 1fr 90px;gap:6px;align-items:center;margin-bottom:5px}
  .procrow span{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <h1>注文入力</h1>
  <div class="sub">お客様情報+明細を手入力 → 保存するとDBに登録され、作業者画面・ダッシュボードに反映されます。</div>
  <div class="nav">
    <a href="/worker" target="_blank">▶ 作業者画面</a>
    <a href="/dashboard" target="_blank">▶ ダッシュボード</a>
  </div>

  <div class="panel">
    <h3 style="margin-top:0">お客様情報</h3>
    <div class="grid g3">
      <div><label>販売チャネル</label>
        <select id="channel">
          <option value="rakuten">rakuten</option>
          <option value="amazon">amazon</option>
          <option value="yahoo">yahoo</option>
          <option value="base_ec">base_ec (自社)</option>
        </select></div>
      <div><label>お客様名</label><input id="customer_name" placeholder="山田太郎"></div>
      <div><label>決済状態</label>
        <select id="payment_status">
          <option value="paid">paid</option>
          <option value="pending">pending</option>
          <option value="unpaid">unpaid</option>
        </select></div>
    </div>
    <div class="grid g3" style="margin-top:6px">
      <div><label>郵便番号</label><input id="postal_code" placeholder="4910000"></div>
      <div style="grid-column:span 2"><label>住所</label><input id="address" placeholder="愛知県一宮市..."></div>
    </div>
    <div class="grid g2" style="margin-top:6px">
      <div><label>電話</label><input id="phone" placeholder="090..."></div>
      <div><label>モール注文番号(任意)</label><input id="mall_order_no" placeholder="RKT-..."></div>
    </div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0">明細 <span style="color:var(--muted);font-size:12px">(作業指示書・ラベル1枚単位)</span></h3>
    <div id="items"></div>
    <button class="btn-add" onclick="addItem()">＋ 明細追加</button>
  </div>

  <div class="panel" style="display:flex;align-items:center;gap:12px">
    <label style="margin:0">ラベルの版</label>
    <select id="label_template" style="max-width:320px">
      <option value="">既定(管理画面の設定に従う)</option>
    </select>
    <span class="sub" style="margin:0">この注文だけ別の版で刷りたい時に変更してください。</span>
  </div>

  <button class="btn-sub" onclick="submitOrder()">💾 注文を保存</button>
  <div class="panel" id="resultPanel" style="display:none"><div id="result"></div></div>

<script>
  // ===== 設定 =====
  const API_BASE = "";  // 同じサーバーから配信されるなら空値。別の場所なら "http://localhost:8000"
  // 辺の加工 = ハトメのみ。ベルクロ・スカートは同じ辺に同時に付くので別項目で持つ。
  const PROC_SIDE = [["none","なし"],["eyelet","ハトメ"]];
  const EYELET_MM = ["", "300", "200", "400"];  // 先頭""=未選択(ハトメ以外は空欄)。ハトメ選択時は300mmが既定
  const FABRIC = ["LN","DP","SDP"];
  const PRODUCT = ["single","two_sheet_set","skirt"];
  // ベルクロ面数。2枚セットは「なし」を選べない(必ず3面か4面)。
  const VELCRO_SIDES = [["","なし"],["3","3面(上・左・右)"],["4","4面"]];

  let itemSeq = 0;
  // ハトメ以外(なし/スカート)ではピッチ欄を空欄・無効化し、ハトメを選ぶと自動で300mmを選択する
  function onProcChange(sel){
    const mmSel = sel.closest(".procrow").querySelector('[data-f$="_mm"]');
    if(sel.value === "eyelet"){
      mmSel.disabled = false;
      if(!mmSel.value) mmSel.value = "300";
    }else{
      mmSel.disabled = true;
      mmSel.value = "";
    }
  }
  // 上・左・右 は既定で「ハトメ P300」。下辺はスカートが付くことが多いので既定「なし」。
  // (下辺もハトメを選べる — 注文によってスカート+ハトメの両方が付く)
  function procRow(side, labelJa){
    const isBottom = (side === "bottom");
    const defKind  = isBottom ? "none" : "eyelet";
    const defMm    = isBottom ? ""     : "300";
    const opts = PROC_SIDE.map(([v,l])=>`<option value="${v}"${v===defKind?" selected":""}>${l}</option>`).join("");
    const mms  = EYELET_MM.map(v=>`<option value="${v}"${v===defMm?" selected":""}>${v?v+"mm":"-"}</option>`).join("");
    return `<div class="procrow">
      <span>${labelJa}</span>
      <select data-f="process_${side}" onchange="onProcChange(this)">${opts}</select>
      <select data-f="process_${side}_mm"${defKind==="eyelet"?"":" disabled"}>${mms}</select>
    </div>`;
  }
  function addItem(){
    itemSeq++;
    const div=document.createElement("div");
    div.className="item"; div.dataset.id=itemSeq;
    div.innerHTML=`
      <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
      <h3>明細 #${itemSeq}</h3>
      <div class="grid g4">
        <div><label>商品種別</label><select data-f="product_type" onchange="onProductChange(this)">${PRODUCT.map(p=>`<option>${p}</option>`).join("")}</select></div>
        <div><label>原団(表面)</label><select data-f="fabric_type">${FABRIC.map(p=>`<option>${p}</option>`).join("")}</select></div>
        <div><label>防炎</label><select data-f="flame" onchange="onFlameChange(this)">
          <option value="yes">防炎あり</option><option value="no">防炎なし</option>
        </select></div>
        <div><label>数量</label><input type="number" data-f="quantity" value="1"></div>
      </div>
      <div class="grid g2" style="margin-top:6px">
        <div><label>幅 W(mm) 表面</label><input type="number" data-f="width_mm" placeholder="3000"></div>
        <div><label>高さ H(mm) 表面</label><input type="number" data-f="height_mm" placeholder="2500"></div>
      </div>
      <div class="backwrap" style="display:none;margin-top:6px">
        <div class="grid g3">
          <div><label>原団(裏面)</label><select data-f="back_fabric_type">${FABRIC.map(p=>`<option>${p}</option>`).join("")}</select></div>
          <div><label>幅 W(mm) 裏面</label><input type="number" data-f="back_width_mm" placeholder="3000"></div>
          <div><label>高さ H(mm) 裏面</label><input type="number" data-f="back_height_mm" placeholder="2500"></div>
        </div>
      </div>
      <label style="margin-top:8px">ハトメ(辺ごと + 間隔mm) <span style="color:var(--muted)">※ベルクロ・スカートは下で別途指定</span></label>
      ${procRow("top","上")}${procRow("bottom","下")}${procRow("left","左")}${procRow("right","右")}
      <div class="grid g3" style="margin-top:8px">
        <div><label>ベルクロ面数</label><select data-f="velcro_sides">
          ${VELCRO_SIDES.map(([v,l])=>`<option value="${v}">${l}</option>`).join("")}
        </select></div>
        <div class="velcrotype"><label>ベルクロ種別</label><select data-f="velcro_type">
          <option value="male">オス</option><option value="female">メス</option>
        </select></div>
        <div><label>ハトメ配置方式</label><select data-f="eyelet_method">
          <option value="">-</option><option value="A">方式A(コーナー基準)</option><option value="B">方式B(間隔均等)</option><option value="C">方式C(未定)</option>
        </select></div>
      </div>
      <div class="grid g3" style="margin-top:6px">
        <div><label>スカート(下辺)</label><select data-f="has_skirt" onchange="onSkirtChange(this)">
          <option value="false">無し</option><option value="true">有り</option>
        </select></div>
        <div class="skirtopt"><label>スカート取付方法</label><select data-f="skirt_attachment">
          <option value="">-</option><option value="sew">縫い付け</option><option value="velcro">マジックテープ</option>
        </select></div>
        <div class="skirtopt"><label>スカート継ぎ目</label><select data-f="skirt_no_seam">
          <option value="false">通常</option><option value="true">シームレス</option>
        </select></div>
      </div>
      <label>防炎認証番号</label><input data-f="fire_cert_no" placeholder="BOEN-2026-...">
    `;
    document.getElementById("items").appendChild(div);
    onProductChange(div.querySelector('[data-f="product_type"]'));
    onSkirtChange(div.querySelector('[data-f="has_skirt"]'));
  }
  addItem();

  // ラベルの版の一覧を読み込む(まだ作られていない版は返ってこない)
  (async ()=>{
    try{
      const d=await fetch(API_BASE+"/api/label-templates").then(r=>r.json());
      const sel=document.getElementById("label_template");
      const cur=(d.templates.find(t=>t.key===d.current)||{}).name||"";
      sel.options[0].textContent = cur ? `既定(${cur})` : "既定(管理画面の設定に従う)";
      d.templates.forEach(t=>{
        const o=document.createElement("option");
        o.value=t.key; o.textContent=`${t.name}  —  ${t.page||""}`.trim();
        sel.appendChild(o);
      });
    }catch(e){ /* 一覧が取れなくても既定で刷れるので黙って続行 */ }
  })();

  // 「防炎なし」を選んだら認証番号欄は空欄・無効化する
  function onFlameChange(sel){
    const noFlame = sel.value === "no";
    const cert = sel.closest(".item").querySelector('[data-f="fire_cert_no"]');
    cert.disabled = noFlame;
    if(noFlame) cert.value = "";
  }

  // スカート「無し」なら取付方法・継ぎ目は不要なので隠す
  function onSkirtChange(sel){
    const on = sel.value === "true";
    sel.closest(".item").querySelectorAll(".skirtopt").forEach(e=>{
      e.style.visibility = on ? "visible" : "hidden";
    });
  }

  // 商品種別で切り替わるもの
  //   ・2枚セット → 裏面欄を表示 / ベルクロ種別(オス・メス)は非表示 / 面数は「なし」を選べない
  //   ・それ以外   → 裏面欄を隠す / ベルクロ種別を表示 / 面数は「なし」も選べる
  function onProductChange(sel){
    const item  = sel.closest(".item");
    const isSet = sel.value === "two_sheet_set";

    item.querySelector(".backwrap").style.display   = isSet ? "block" : "none";
    item.querySelector(".velcrotype").style.display = isSet ? "none"  : "block";

    const vs   = item.querySelector('[data-f="velcro_sides"]');
    const list = isSet ? VELCRO_SIDES.filter(([v])=>v !== "") : VELCRO_SIDES;
    const keep = vs.value;
    vs.innerHTML = list.map(([v,l])=>`<option value="${v}">${l}</option>`).join("");
    // 2枚セットに切り替えた時に「なし」だったら3面へ寄せる
    vs.value = list.some(([v])=>v === keep) ? keep : (isSet ? "3" : "");
  }

  function collectItem(el){
    const o={};
    el.querySelectorAll("[data-f]").forEach(f=>{
      const key = f.dataset.f;
      let v;
      if(f.type==="checkbox"){ v = f.checked; }
      else{
        v = f.value;
        if(v===""){ v = null; }
        else if(f.type==="number" || key.endsWith("_mm")){ v = Number(v); }
      }
      o[key]=v;
    });
    // 「防炎なし」時は認証番号の代わりに非防炎の印を入れる(DB列は既存の fire_cert_no のまま)
    if(o.flame === "no") o.fire_cert_no = "非防炎";
    delete o.flame;
    // select の文字列を DB の型に合わせる
    o.has_skirt     = (o.has_skirt === "true");
    o.skirt_no_seam = (o.skirt_no_seam === "true");
    o.velcro_sides  = o.velcro_sides ? Number(o.velcro_sides) : null;
    if(!o.has_skirt){ o.skirt_attachment = null; o.skirt_no_seam = false; }
    return o;
  }
  async function submitOrder(){
    const body={
      channel:val("channel"), customer_name:val("customer_name"),
      postal_code:val("postal_code"), address:val("address"), phone:val("phone"),
      payment_status:val("payment_status"), mall_order_no:val("mall_order_no")||null,
      label_template:val("label_template")||null,
      items:[...document.querySelectorAll(".item")].map(collectItem),
    };
    try{
      const r=await fetch(API_BASE+"/api/orders",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      const p=document.getElementById("resultPanel"); p.style.display="block";
      if(!r.ok){ document.getElementById("result").style.color="var(--danger)"; document.getElementById("result").textContent="エラー: "+JSON.stringify(d,null,2); return; }
      document.getElementById("result").style.color="var(--ok)";
      document.getElementById("result").innerHTML=
        "✔ 保存完了\n注文番号: "+d.order_no+
        "\n\nラベル(製品番号) — 在庫QRラベルと同様、自動で1つのタブにまとめて表示・印刷されます"+
        "(2枚セットは表面/裏面が一緒に出ます)。開かなかった場合はこちらから:\n"+
        d.barcodes.map(b=>'  <a href=\"/label/'+encodeURIComponent(b)+'?print=1'+(d.label_template?'&tpl='+encodeURIComponent(d.label_template):'')+'\" target=\"_blank\" style=\"color:var(--accent);font-family:monospace\">🖨 '+b+'</a>').join("\n")+
        "\n\n→ 作業者画面・ダッシュボードで確認してください。(スキャンはこのバーコードで)";
      // 在庫QRラベル発行と同じ方式: 注文の全バーコードを1つのタブにまとめて開き、自動で印刷ダイアログを出す
      if(d.barcodes && d.barcodes.length){
        const tplQ = d.label_template ? "&tpl="+encodeURIComponent(d.label_template) : "";
        const url = API_BASE+"/label?serials="+d.barcodes.map(encodeURIComponent).join(",")+"&print=1"+tplQ;
        window.open(url, "_blank");
      }
    }catch(e){ alert("サーバー接続失敗: "+e); }
  }
  const val=id=>document.getElementById(id).value;
</script>
</body>
</html>

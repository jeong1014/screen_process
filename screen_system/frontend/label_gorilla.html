<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スクリーン生地ラベル (ゴリラインパクト)</title>
  <style>
    @page {
      size: 110mm 412mm;
      margin: 0;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .label {
      position: relative;
      width: 110mm;
      height: 412mm;
      margin: 0 auto;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      overflow: hidden;
    }

    .label>* {
      position: absolute;
    }

    /* ===== 二つ折り =====
       全長 412mm を 206mm で折る。折り目の前後に約10mmずつ余白。
       表面 206mm / 裏面 206mm で長さが揃うため、折ると端がぴったり合う。
       上半分 = 表面 / 下半分 = 裏面。折って裏返すと下半分は上下逆さまに見えるため、
       下半分をまとめて 180° 回転させて印刷する(=折った状態で正しく読める)。
       */
    .backside {
      position: absolute;
      left: 0;
      top: 206mm;
      width: 110mm;
      height: 206mm;
      transform: rotate(180deg);
    }

    .backside>* {
      position: absolute;
    }

    /* 折り位置の目印(端の短い線だけ。中央は印字しない) */
    .foldmark {
      top: 206mm;
      width: 5mm;
      height: 0;
      border-top: 0.3mm solid #000;
    }

    .foldmark.l { left: 0; }
    .foldmark.r { right: 0; }

    /* 画面で確認する時だけ折り線を薄く見せる(印刷には出ない) */
    @media screen {
      .foldguide {
        left: 0;
        right: 0;
        top: 206mm;
        height: 0;
        border-top: 0.2mm dashed #9bb;
      }
    }

    @media print {
      .foldguide { display: none; }
    }

    @media screen {
      body {
        background: #e9edf2;
      }

      #sheet {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 18px 0;
      }

      #sheet .label {
        box-shadow: 0 3px 14px rgba(0, 0, 0, .15);
      }
    }

    /* ===== absolute-positioned blocks pinned to PSD coordinates ===== */

    /* perforation filled dots (top / bottom) */
    .perf {
      left: 0.6mm;
      right: 0.6mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .perf i {
      width: 3.4mm;
      height: 3.4mm;
      border-radius: 50%;
      background: #000;
      display: block;
    }

    .perf.top {
      top: 15.0mm;
    }

    .perf.bottom {
      top: 393.6mm;
    }

    /* header LN + product name */
    .head {
      left: 8.8mm;
      top: 24.4mm;
    }

    .head .code {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 800;          /* 線を太く */
      font-size: 27.5mm;
      line-height: 1;
      letter-spacing: -1.8mm;    /* 文字の間の空きを詰める */
      transform: scaleX(0.82);   /* 字幅を細くする(LN/DP/SDP 共通) */
      transform-origin: left center;
    }

    .head .name {
      font-size: 4.8mm;
      font-weight: 500;
      letter-spacing: -0.1mm;
      margin-top: -2.4mm;
    }

    /* spec table */
    table.spec {
      left: 8.8mm;
      top: 65.5mm;
      border-collapse: collapse;
    }

    table.spec td {
      font-size: 4.6mm;
      line-height: 5.0mm;
      padding: 0;
      vertical-align: top;
      white-space: nowrap;
    }

    table.spec .en {
      font-weight: 800;
      width: 19.1mm;
    }

    table.spec .jp {
      font-weight: 500;
      width: 24.2mm;
    }

    table.spec .v1 {
      font-weight: 500;
      width: 14.6mm;
    }

    table.spec .v2 {
      font-weight: 500;
    }

    /* barcode */
    .barcode-wrap {
      left: 0;
      right: 0;
      top: 104.4mm;
      text-align: center;
    }

    .barcode-wrap svg {
      width: 104mm;
      height: 18.7mm;
      display: block;
      margin: 0 auto;
    }

    .barcode-text {
      font-size: 3.0mm;
      font-weight: 500;
      letter-spacing: 0.3mm;
      margin-top: 1.6mm;
    }

    /* gorilla brand logo */
    .gorilla {
      left: 50%;
      transform: translateX(-50%);
      top: 135.5mm;
      width: 108.4mm;
      max-width: none;
      height: auto;
      display: block;
    }

    /* wash care */
    .washcare {
      left: 50%;
      transform: translateX(-50%);
      top: 44.5mm;
      width: 103.5mm;
      height: auto;
      display: block;
    }

    /* QR */
    .qrbox {
      left: 50%;
      transform: translateX(-50%);
      top: 83.6mm;
      width: 58.2mm;
      height: 58.2mm;
    }

    .qrbox img.qr {
      width: 58.2mm;
      height: 58.2mm;
      display: block;
      image-rendering: pixelated;
    }

    .qrbox .qrmark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 11mm;
      height: 11mm;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qrbox .qrmark img {
      width: 9mm;
      height: auto;
      display: block;
    }

    /* company footer text */
    .foot {
      left: 0;
      right: 0;
      top: 150.8mm;
      text-align: center;
    }

    .foot .company {
      font-size: 3.4mm;
      font-weight: 600;
      line-height: 4.5mm;
    }

    .foot .addr {
      font-size: 3.4mm;
      font-weight: 500;
      line-height: 4.5mm;
    }

    /* design line + CDI logo (separate absolute blocks) */
    .design {
      left: 0;
      right: 0;
      top: 170.0mm;
      text-align: center;
      font-size: 3.1mm;
      font-weight: 500;
      color: #7d7d7d;
      letter-spacing: 0.2mm;
    }

    .cdilogo {
      left: 50%;
      transform: translateX(-50%);
      top: 179.1mm;
      width: 94.5mm;
      height: auto;
      display: block;
    }

    /* eyelets (double ring circles) */
    .eyelets {
      left: 0.2mm;
      right: 0.2mm;
      top: 381.6mm;
      display: flex;
      justify-content: space-between;
    }

    .eyelets i {
      width: 7mm;
      height: 7mm;
      border-radius: 50%;
      border: 0.9mm solid #000;
      position: relative;
      display: block;
    }

    .eyelets i::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 3.2mm;
      height: 3.2mm;
      border-radius: 50%;
      border: 0.7mm solid #000;
    }

  </style>
</head>

<body>
  <div id="sheet">
    <div class="label">
      <div class="perf top" id="perfTop"></div>

      <div class="head">
        <div class="code" id="fCode">LN</div>
        <div class="name" id="fName">特殊ダブルレイヤーポリエステル生地</div>
      </div>

      <table class="spec">
        <tbody id="specBody"></tbody>
      </table>

      <div class="barcode-wrap">
        <svg id="barcode"></svg>
        <div class="barcode-text" id="barcodeText"></div>
      </div>

      <img class="gorilla" id="gorilla" alt="ゴリラインパクト スクリーン">

      <!-- 折り位置(224.6mm)の目印 -->
      <div class="foldmark l"></div>
      <div class="foldmark r"></div>
      <div class="foldguide"></div>

      <!-- ===== ここから裏面(下半分)。180°回転して印刷される ===== -->
      <div class="backside">
        <img class="washcare" id="washcare" alt="洗濯表示">

        <div class="qrbox">
          <img class="qr" id="qrimg" alt="QR">
          <div class="qrmark"><img id="qrmark" alt="CDI"></div>
        </div>

        <div class="foot">
          <div class="company" id="cCompany">株式会社シーディアイ</div>
          <div class="addr" id="cAddr1">〒491-0922　愛知県一宮市大和町妙興寺字丹波12番</div>
          <div class="addr" id="cAddr2">Tel　0586-27-0123　　　https://www.cdi.jpn.com/</div>
        </div>

        <div class="design" id="cDesign">Design and Quality CDI of JAPAN</div>
        <img class="cdilogo" id="cdilogo" alt="株式会社シーディアイ">

      </div>

      <!-- 点線(ミシン目・アイレット)は回転させず、用紙のいちばん下に置く -->
      <div class="eyelets" id="eyelets"></div>
      <div class="perf bottom" id="perfBottom"></div>
    </div>
  </div>

    /* =====================================================================
     実データ連携ラベル(ゴリラインパクト)
     ・/label/{barcode} で開くと /api/label/{barcode} から自動記入
     ・/label?serials=バーコード1,バーコード2 で複数枚(2枚セットの表/裏など)
     ・?print=1 で自動印刷 / ?api=... でAPI URLを上書き(デバッグ)
     ・データが無ければサンプルを1枚表示
     ※スペック表は PSD 項目(layer/Velcro/Skirt/Eyelet)を維持。
       実データに差し替えるのは Fabric / Size / 生地コード / バーコード / QR のみ。
       (layer 等は現DBに対応項目が無いためテンプレート値を保持)
     =================================================================== */
    const FABRIC_NAMES = {
      LN:  "ローノイズポリエステル生地",
      DP:  "ダブルレイヤーポリエステル生地",
      SDP: "スペシャルダブルレイヤーポリエステル生地"
    };

    /* 仕様表の行を /api/label のレスポンスから組み立てる。
       以前はここに固定値が書かれており、注文内容に関わらず同じ値が印字されていた。 */
    function procText(x) {
      if (!x) return "なし";
      if (x.type === "eyelet") return ("P" + (x.spacing || "")).trim() + (x.skirt ? "＋スカート" : "");
      if (x.type === "skirt" || x.skirt) return "スカート";
      if (x.type === "velcro") return "ベルクロ";
      return "なし";
    }

    function specRows(a) {
      const p = a.processing || {};
      return [
        ["Fabric", "生地",     a.fabric || "",                       ""],
        ["Size",   "サイズ",   sizeText(a),                          ""],
        ["Velcro", "ベルクロ", a.velcroSides ? a.velcroSides + "面" : "なし", a.velcroType || ""],
        ["Skirt",  "スカート", a.hasSkirt ? "あり" : "なし",          a.skirtAttachment || ""],
        ["Eyelet", "上/下",    procText(p.top),                      procText(p.bottom)],
        ["",       "左/右",    procText(p.left),                     procText(p.right)]
      ];
    }

    /* データが無い時のサンプル */
    const SAMPLE = {
      code: "LN",
      name: "特殊ダブルレイヤーポリエステル生地",
      spec: [["Fabric","生地","LN",""], ["Size","サイズ","W:2800×H:3000",""],
             ["Velcro","ベルクロ","3面","オス"], ["Skirt","スカート","あり","縫い付け"],
             ["Eyelet","上/下","P300","P300＋スカート"], ["","左/右","P300","P300"]],
      barcodeValue: "CDI260717001SDP01",
      barcodeText: "CDI260717001SDP",
      qrValue: "https://cdigolf.base.ec/",
      perfDots: 24, eyelets: 7
    };

    function sizeText(a) {
      if (a.width_mm && a.height_mm) return `W:${a.width_mm}×H:${a.height_mm}`;
      const m = String(a.size || "").match(/W:?\s*(\d+)\s*[×xX]\s*H:?\s*(\d+)/i);
      return m ? `W:${m[1]}×H:${m[2]}` : (a.size || "");
    }

    /* /api/label のレスポンス → ラベル描画データ(PSD項目維持) */
    function buildData(a) {
      const fabric = a.fabric || "DP";
      const bc = a.barcodeValue || a.barcode || "";
      return {
        code: fabric,
        name: FABRIC_NAMES[fabric] || a.fabricNameJp || "",
        spec: specRows(a),
        barcodeValue: bc,
        barcodeText: a.barcodeText || bc,
        qrValue: a.qrValue || "https://cdigolf.base.ec/",
        perfDots: 24, eyelets: 7
      };
    }

    function dots(el, n) { el.innerHTML = ""; for (let i = 0; i < n; i++) el.appendChild(document.createElement("i")); }

    function render(d, root) {
      const q = id => root.querySelector("#" + id);
      q("fCode").textContent = d.code;
      q("fName").textContent = d.name;
      q("gorilla").src = IMG.gorilla;
      q("washcare").src = IMG.washcare;
      q("cdilogo").src = IMG.cdilogo;
      q("qrmark").src = IMG.cdimark;

      const tb = q("specBody"); tb.innerHTML = "";
      d.spec.forEach(r => {
        const tr = document.createElement("tr");
        const wide = (r[3] === undefined || r[3] === "");
        tr.innerHTML = `<td class="en">${r[0]}</td><td class="jp">${r[1]}</td>`
          + (wide ? `<td class="v1" colspan="2">${r[2]}</td>`
            : `<td class="v1">${r[2]}</td><td class="v2">${r[3]}</td>`);
        tb.appendChild(tr);
      });

      try {
        JsBarcode(q("barcode"), d.barcodeValue, { format: "CODE128", width: 2, height: 70, displayValue: false, margin: 0 });
        const _bc = q("barcode"); if (_bc) _bc.setAttribute("preserveAspectRatio", "none");
      } catch (e) { console.error("barcode", e); }
      q("barcodeText").textContent = d.barcodeText;

      try {
        const qr = qrcode(0, "H"); qr.addData(d.qrValue); qr.make();
        q("qrimg").src = qr.createImgTag(6, 0).match(/src="([^"]+)"/)[1];
      } catch (e) { console.error("qr", e); }

      dots(q("perfTop"), d.perfDots);
      dots(q("perfBottom"), d.perfDots);
      dots(q("eyelets"), d.eyelets);
    }

    /* 既存の .label を雛形として取り出し、注文ごとに複製して描画する */
    const sheet = document.getElementById("sheet");
    const tpl = sheet.querySelector(".label");
    tpl.remove();

    function addLabel(d) {
      const node = tpl.cloneNode(true);
      sheet.appendChild(node);
      render(d, node);
      return node;
    }

    async function fetchLabelData(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("API " + res.status + " " + url);
      return res.json();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(location.search);
      const doPrint = params.get("print") === "1";
      const apiOverride = params.get("api");
      let serials = (params.get("serials") || "").split(",").map(s => s.trim()).filter(Boolean);
      if (!serials.length) {
        const parts = location.pathname.split("/").filter(Boolean);
        const bc = decodeURIComponent(parts[parts.length - 1] || "");
        if (bc && bc.toLowerCase() !== "label") serials = [bc];
      }
      const after = () => { if (doPrint) setTimeout(() => window.print(), 600); };

      if (!serials.length && !apiOverride) { addLabel(SAMPLE); after(); return; }
      if (apiOverride && !serials.length) {
        try { addLabel(buildData(await fetchLabelData(apiOverride))); }
        catch (e) { console.error(e); addLabel(SAMPLE); }
        after(); return;
      }
      for (const bc of serials) {
        try {
          const url = apiOverride || ("/api/label/" + encodeURIComponent(bc));
          addLabel(buildData(await fetchLabelData(url)));
        } catch (e) {
          console.error(e);
          const err = document.createElement("div");
          err.style.cssText = "color:#c0392b;font:14px sans-serif;text-align:center;padding:20px";
          err.textContent = "ラベル取得失敗 (" + bc + "): " + (e.message || e);
          sheet.appendChild(err);
        }
      }
      after();
    });
  </script>
</body>

</html>

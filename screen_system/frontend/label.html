<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スクリーン生地ラベル</title>
  <style>
    @page {
      size: 110mm 290mm;
      margin: 0;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #fff;
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }

    .label {
      width: 110mm;
      height: 290mm;
      margin: 0 auto;
      padding: 30mm 8mm 6mm 8mm;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      page-break-after: always;
    }
    .label:last-child { page-break-after: auto; }

    /* 複数枚(2枚セットの表/裏など)をまとめて表示する時の画面プレビュー用 */
    @media screen {
      body { background: #eef1f5; }
      #sheet { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 18px 0; }
      #sheet .label { box-shadow: 0 2px 10px rgba(0,0,0,.12); }
      .labelerr { color: #c0392b; font: 14px sans-serif; text-align: center; padding: 20px; }
    }

    /* ミシン目 */
    .perf {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1mm;
    }

    .perf i {
      width: 1.9mm;
      height: 1.9mm;
      border-radius: 50%;
      background: #111;
      display: block;
    }

    /* 上部クラスタ(ヘッダー・仕様・バーコード) */
    .cluster-top {
      margin-top: 8mm;
    }

    .cluster-top>* {
      margin: 0;
    }

    .head .code {
      font-size: 23mm;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.5mm;
    }

    .head .name {
      font-size: 6.2mm;
      font-weight: 800;
      margin-top: 1.8mm;
      letter-spacing: 0.05mm;
    }

    table.spec {
      border-collapse: collapse;
      margin-top: 1.5mm;
      width: 100%;
    }

    table.spec td {
      font-size: 4.8mm;
      line-height: 8.1mm;
      padding: 0;
      vertical-align: top;
      white-space: nowrap;
      font-weight: 800;
    }

    table.spec .en {
      font-weight: 900;
      width: 23mm;
    }

    table.spec .jp {
      font-weight: 800;
      width: 28mm;
    }

    table.spec .v1 {
      font-weight: 900;
      width: 27mm;
    }

    table.spec .v2 {
      font-weight: 900;
    }

    .barcode-wrap {
      margin-top: 3mm;
      text-align: center;
    }

    .barcode-wrap svg {
      width: 92mm;
      height: 30mm;
    }

    .barcode-text {
      font-size: 4.2mm;
      font-weight: 900;
      letter-spacing: 0.45mm;
      margin-top: 1.2mm;
    }


    /* QR + 取付方向ブロック */
    .mid {
      display: flex;
      gap: 6mm;
      align-items: stretch;
      margin-top: 2mm;
    }

    .qr {
      width: 48mm;
      position: relative;
    }

    .qr img {
      width: 48mm;
      height: 48mm;
      display: block;
      image-rendering: pixelated;
    }

    .qr .logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 11mm;
      height: 11mm;
      background: #fff;
      border-radius: 1mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr .logo img {
      width: 9.5mm;
      height: auto;
      display: block;
    }

    /* 取付方向: 方向図 (orientation) */
    .orient {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .orient .title {
      font-size: 3.4mm;
      font-weight: 800;
      margin-bottom: 4mm;
      letter-spacing: 0.2mm;
    }

    .odiagram {
      border-collapse: collapse;
    }

    .odiagram td {
      text-align: center;
      vertical-align: middle;
      padding: 1mm 1.5mm;
    }

    .odiagram .oc {
      font-size: 3.0mm;
      font-weight: 800;
      white-space: nowrap;
    }

    .odiagram .obox {
      width: 22mm;
      height: 27mm;
      border: 0.5mm solid #000;
    }

    .obox .oarrow {
      display: block;
      font-size: 5.5mm;
      line-height: 1;
    }

    .obox .oup {
      display: block;
      font-size: 3.6mm;
      font-weight: 800;
      margin-top: 0.5mm;
    }

    .obox .ofront {
      display: block;
      font-size: 3.6mm;
      font-weight: 800;
      margin-top: 0.8mm;
    }

    /* 取付方向: 向きマーク (direction) */
    .direction {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .direction .title {
      font-size: 3.4mm;
      font-weight: 800;
      margin-bottom: 2mm;
      letter-spacing: 0.2mm;
    }

    .direction .darrow {
      font-size: 15mm;
      line-height: 0.85;
    }

    .direction .dtop {
      font-size: 4.8mm;
      font-weight: 800;
      margin-top: 1mm;
    }

    .direction .dhr {
      width: 72%;
      border-top: 0.4mm solid #000;
      margin: 2.6mm 0;
    }

    .direction .dfront {
      font-size: 4.8mm;
      font-weight: 800;
    }

    .direction .dsub {
      font-size: 2.9mm;
      font-weight: 700;
      margin-top: 1mm;
    }

    /* フッター */
    .foot {
      text-align: center;
      line-height: 5.8mm;
      margin-top: 7mm;
    }

    .foot .company {
      font-size: 3.8mm;
      font-weight: 900;
    }

    .foot .addr {
      font-size: 3.2mm;
      font-weight: 700;
    }

    .foot .design {
      font-size: 3.8mm;
      font-weight: 900;
      margin-top: 1.8mm;
      letter-spacing: 0.2mm;
    }

    /* Gorilla Impact Screen ブランドロゴ — Design and Quality の直後に配置 */
    .foot .brand-logo {
      display: block;
      width: 62mm;
      height: auto;
      margin: 2.2mm auto 0;
    }

    /* ハトメ(円) — Design and Quality の直下に詰めて配置 */
    .eyelets {
      display: flex;
      justify-content: space-between;
      padding: 0 3mm;
      margin-top: 2.4mm;
      margin-bottom: 2.0mm;
    }

    #perfBottom {
      margin-top: 0;
    }

    .eyelets i {
      width: 7mm;
      height: 7mm;
      border-radius: 50%;
      border: 0.9mm solid #111;
      position: relative;
      display: block;
    }

    .eyelets i::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 3.2mm;
      height: 3.2mm;
      border-radius: 50%;
      border: 0.7mm solid #111;
    }

    @media print {

      html,
      body {
        width: 110mm;
        height: 290mm;
      }

      .label {
        margin: 0;
      }
    }
  </style>
</head>

            var c = String.fromCharCode(_data[dataIndex]);

            if (table.contains(s + c)) {

      return qrcode;

    // multibyte support

  </script>

  <script>
    /* =====================================================================
       ★ データ設定 — 作業指示書APIと同じ形式でも、このHTML単体でも使用可能
       ---------------------------------------------------------------------
       APIで使う場合:
       screen_fabric_label_2_v5.html?api=/api/work-orders/WO-TEST-001
       screen_fabric_label_2_v5.html?api=/api/work-orders/WO-TEST-001&poll=3000
       ===================================================================== */
    const FABRIC_NAMES = {
      LN: "ローノイズポリエステル生地",                 /* ※LN/SDPの和名は要確認 */
      DP: "ダブルレイヤーポリエステル生地",
      SDP: "スペシャルダブルレイヤーポリエステル生地"
    };

    const labelData = {
      workOrderNo: "WO-TEST-001",
      orderNo: "ORD-TEST-001",
      fabric: "DP",                       /* LN / DP / SDP */
      fabricNameJp: null,                  /* null=FABRIC_NAMESから自動 */
      product: "2枚セット",
      width_mm: 4000,
      height_mm: 3000,
      set_quantity: 3,
      sheets_per_set: 2,
      total_sheets: null,                  /* null=数量×枚数で自動 */
      processing: {
        top: { type: "eyelet", spacing: 300 },
        bottom: { type: "skirt" },
        left: { type: "eyelet", spacing: 200 },
        right: { type: "eyelet", spacing: 300 }
      },
      barcodeNo: null,                     /* null=workOrderNo/orderNoから自動 */
      barcodeValue: null,                  /* null=製品番号(CDI+YYMMDD+当日連番+生地名)から自動生成 */
      productNo: null,                     /* null=workOrderNo等から自動生成。手動指定も可(例: "CDI250714001SDP") */
      barcodeText: null,
      qrValue: "https://cdigolf.base.ec/", /* ← QR内容(固定) */
      midStyle: "direction",                /* "orientation"=方向図 / "direction"=向きマーク */
      eyeletCircles: 7
    };

    function setText(root, id, v) {
      const el = root.querySelector("#" + id);
      if (el) el.textContent = v == null ? "" : String(v);
    }

    function getValue(d, snakeKey, camelKey, fallback = "") {
      if (d && d[snakeKey] != null) return d[snakeKey];
      if (d && camelKey && d[camelKey] != null) return d[camelKey];
      return fallback;
    }

    function normalizeData(raw) {
      const base = Object.assign({}, labelData, raw || {});
      const width = Number(getValue(base, "width_mm", "widthMm", parseSize(base.size)?.w || 0));
      const height = Number(getValue(base, "height_mm", "heightMm", parseSize(base.size)?.h || 0));
      const setQty = Number(getValue(base, "set_quantity", "setQuantity", 1));
      const sheetsPerSet = Number(getValue(base, "sheets_per_set", "sheetsPerSet", base.product === "2枚セット" ? 2 : 1));
      const totalSheetsRaw = getValue(base, "total_sheets", "totalSheets", null);
      const totalSheets = totalSheetsRaw == null ? setQty * sheetsPerSet : Number(totalSheetsRaw);

      return Object.assign({}, base, {
        fabric: base.fabric || "DP",
        product: base.product || "2枚セット",
        width_mm: width,
        height_mm: height,
        set_quantity: setQty,
        sheets_per_set: sheetsPerSet,
        total_sheets: totalSheets,
        processing: Object.assign({
          top: { type: "none" },
          bottom: { type: "none" },
          left: { type: "none" },
          right: { type: "none" }
        }, base.processing || {})
      });
    }

    function parseSize(sizeText) {
      const m = String(sizeText || "").match(/W:?\s*(\d+)\s*[×xX]\s*H:?\s*(\d+)/i);
      if (!m) return null;
      return { w: m[1], h: m[2] };
    }

    function buildSizeText(d) {
      if (d.width_mm && d.height_mm) return `W${d.width_mm}×H${d.height_mm}`;
      const parsed = parseSize(d.size);
      if (parsed) return `W${parsed.w}×H${parsed.h}`;
      return d.size || "";
    }

    function buildQtyText(d) {
      if (d.product === "2枚セット") {
        return `${d.set_quantity}セット / 合計${d.total_sheets}枚`;
      }
      if (d.product === "1枚") {
        return `${d.set_quantity}枚 / 合計${d.total_sheets}枚`;
      }
      return `${d.set_quantity} / 合計${d.total_sheets}枚`;
    }

    function procText(p) {
      if (!p || !p.type || p.type === "none") return "なし";
      if (p.type === "eyelet") return `ハトメ P${p.spacing || ""}`.trim();
      if (p.type === "skirt") return "スカート";
      if (p.type === "velcro") return "ベルクロ";
      return String(p.type);
    }

    function procShort(p) {
      if (!p || !p.type || p.type === "none") return "なし";
      if (p.type === "eyelet") return `P${p.spacing || ""}`.trim();
      if (p.type === "skirt") return "スカート";
      if (p.type === "velcro") return "ベルクロ";
      return String(p.type);
    }

    function compactProductForBarcode(d) {
      if (d.product === "2枚セット") return `2SETx${d.set_quantity}-TOTAL${d.total_sheets}`;
      if (d.product === "1枚") return `1PCx${d.set_quantity}-TOTAL${d.total_sheets}`;
      return `${String(d.product || "PRODUCT").replace(/[^A-Za-z0-9]/g, "") || "PRODUCT"}x${d.set_quantity}-TOTAL${d.total_sheets}`;
    }

    function buildBarcodeValue(d) {
      const sizePart = buildSizeText(d).replace(/[^A-Za-z0-9]/g, "");
      const no = d.barcodeNo || d.workOrderNo || d.orderNo || "";
      return [d.fabric, sizePart, compactProductForBarcode(d), no].filter(Boolean).join("-");
    }

    function buildBarcodeText(d) {
      if (d.barcodeText) return d.barcodeText;
      const productPart = d.product === "2枚セット"
        ? `2SET×${d.set_quantity} 合計${d.total_sheets}枚`
        : `${d.product}×${d.set_quantity} 合計${d.total_sheets}枚`;
      return [d.fabric, buildSizeText(d), productPart].filter(Boolean).join(" ");
    }

    /* 製品番号: CDI + YYMMDD(当日) + 当日生産連番(3桁) + 生地名
       例: CDI250714001SDP
       workOrderNo(WO-YYYYMMDD-NNN)があればそこから日付・連番を引き継ぐ */
    function buildProductNo(d) {
      if (d.productNo) return d.productNo;

      const src = String(d.barcodeNo || d.workOrderNo || d.orderNo || "");

      // 実際の採番形式(app.py next_order_no): CDI + YYMMDD(2+2+2桁) + 当日連番(3桁)
      // 例: barcode = "CDI260714001SDP01" → 先頭の "CDI260714001" だけを使う
      const m = src.match(/^CDI(\d{2})(\d{2})(\d{2})(\d{3})/i);

      let yy, mm, dd, seq;
      if (m) {
        yy = m[1];
        mm = m[2];
        dd = m[3];
        seq = m[4];
      } else {
        const now = new Date();
        yy = String(now.getFullYear()).slice(2);
        mm = String(now.getMonth() + 1).padStart(2, "0");
        dd = String(now.getDate()).padStart(2, "0");
        seq = "001";
      }

      return `CDI${yy}${mm}${dd}${seq}${d.fabric || ""}`;
    }

    /* root: この1枚分の .label 要素(テンプレートを複製したノード)。
       複数枚(2枚セットの表/裏など)を1ページにまとめて出す時、IDが重複しても
       root.querySelector("#id") で自分自身の中だけを見るので問題ない。 */
    function render(data, root) {
      const d = normalizeData(data);
      setText(root, "fCode", d.fabric);
      setText(root, "fName", d.fabricNameJp || FABRIC_NAMES[d.fabric] || "");
      setText(root, "sFabric", d.fabric);
      setText(root, "sSize", buildSizeText(d));
      setText(root, "sProduct", d.product);
      setText(root, "sQty", buildQtyText(d));
      setText(root, "pTop", procText(d.processing.top));
      setText(root, "pBottom", procText(d.processing.bottom));
      setText(root, "pLeft", procText(d.processing.left));
      setText(root, "pRight", procText(d.processing.right));
      // 取付方向ブロック(方向図 / 向きマーク切替 + データ連動)
      const midStyle = d.midStyle || "orientation";
      const orientEl = root.querySelector("#midOrient");
      const directionEl = root.querySelector("#midDirection");
      if (orientEl) orientEl.style.display = midStyle === "direction" ? "none" : "flex";
      if (directionEl) directionEl.style.display = midStyle === "direction" ? "flex" : "none";
      setText(root, "oTop", "上：" + procText(d.processing.top));
      setText(root, "oBottom", "下：" + procText(d.processing.bottom));
      setText(root, "oLeft", "左：" + procShort(d.processing.left));
      setText(root, "oRight", "右：" + procShort(d.processing.right));

      const productNo = buildProductNo(d);
      const barcodeValue = d.barcodeValue || productNo;
      setText(root, "barcodeText", productNo);

      try {
        JsBarcode(root.querySelector("#barcode"), barcodeValue, {
          format: "CODE128",
          displayValue: false,
          margin: 0,
          height: 150,
          width: 2
        });
      } catch (e) { console.error("barcode error:", e); }

      try {
        const qr = qrcode(0, "H");
        qr.addData(d.qrValue); qr.make();
        const qrEl = root.querySelector("#qrcode");
        qrEl.innerHTML = qr.createImgTag(5, 0);
        const img = qrEl.querySelector("img");
        if (img) { img.style.width = "48mm"; img.style.height = "48mm"; img.style.imageRendering = "pixelated"; }
      } catch (e) { console.error("qr error:", e); }

      const mk = (el, n) => {
        if (!el) return;
        el.innerHTML = "";
        for (let i = 0; i < n; i++) el.appendChild(document.createElement("i"));
      };
      mk(root.querySelector("#perfTop"), 22);
      mk(root.querySelector("#perfBottom"), 22);
      mk(root.querySelector("#eyelets"), d.eyeletCircles || 7);
    }

    async function fetchLabelData(apiUrl) {
      const res = await fetch(apiUrl, { cache: "no-store" });
      if (!res.ok) throw new Error(`API error ${res.status}: ${apiUrl}`);
      return res.json();
    }

    /* テンプレートを1枚分複製して #sheet に追加し、renderする */
    function addLabel(data) {
      const tpl = document.getElementById("labelTpl");
      const node = tpl.content.firstElementChild.cloneNode(true);
      document.getElementById("sheet").appendChild(node);
      render(data, node);
      return node;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(location.search);
      const poll = Number(params.get("poll") || 0);
      const doPrint = params.get("print") === "1";
      const apiOverride = params.get("api");

      // 在庫QRラベル(invlabel.html)と同じ方式: ?serials=a,b,c で複数バーコードを
      // まとめて1ページに出す(2枚セットの表/裏を同時に印刷する時などに使う)。
      // 指定が無ければ URL の /label/{バーコード} を単票として扱う(従来どおり)。
      let serials = (params.get("serials") || "").split(",").map(s => s.trim()).filter(Boolean);
      if (!serials.length) {
        const parts = location.pathname.split("/").filter(Boolean);
        const bc = decodeURIComponent(parts[parts.length - 1] || "");
        if (bc && bc.toLowerCase() !== "label") serials = [bc];
      }

      const afterRender = () => { if (doPrint) setTimeout(() => window.print(), 600); };

      if (apiOverride && !serials.length) {
        // ?api= 単体指定(デバッグ用途): 従来どおり1枚だけ描画
        try {
          const data = await fetchLabelData(apiOverride);
          const node = addLabel(data);
          if (poll > 0) setInterval(() => fetchLabelData(apiOverride).then(d => render(d, node)).catch(console.error), poll);
        } catch (e) { console.error(e); addLabel(labelData); }
        afterRender();
        return;
      }

      if (serials.length) {
        for (const bc of serials) {
          try {
            const url = apiOverride || ("/api/label/" + encodeURIComponent(bc));
            const data = await fetchLabelData(url);
            addLabel(data);
          } catch (e) {
            console.error(e);
            const err = document.createElement("div");
            err.className = "labelerr";
            err.textContent = "ラベル取得失敗 (" + bc + "): " + (e.message || e);
            document.getElementById("sheet").appendChild(err);
          }
        }
      } else {
        // パラメータもパスの指定も無い場合は、サンプルデータを1枚表示(単体プレビュー用)
        addLabel(labelData);
      }
      afterRender();
    });
  </script>
</body>
